name: Azure App Service Deploy

# Builds the Next.js app and deploys it to the Azure App Service Web App
# provisioned by azure-provision.yml. OIDC federated credentials — no
# AZURE_CREDENTIALS secret, no deployment profile XML, no Kudu password.
#
# The workflow produces a ZIP that contains: `.next/`, `public/`, `node_modules/`
# (production-only), `package.json`, `package-lock.json or pnpm-lock.yaml`,
# `next.config.mjs`, `proxy.ts` and the top-level `app/` tree (for Next's
# runtime file-tracing). The App Service runs `npm start` which invokes
# the `start` script in package.json (`next start`).

on:
  push:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "infra/**"
      - "*.md"
  workflow_dispatch:
    inputs:
      environmentName:
        description: "azd environment name whose App Service to deploy to"
        required: true
        default: "prod"

permissions:
  id-token: write   # required for OIDC federated credential login
  contents: read

concurrency:
  group: azure-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"
  AZURE_ENV_NAME: ${{ github.event.inputs.environmentName || 'prod' }}

jobs:
  build_and_deploy:
    name: Build and deploy to App Service
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build
        env:
          # Build-time env vars. Runtime values come from App Service app settings
          # (wired by Bicep) — these are only needed when Next.js inlines
          # NEXT_PUBLIC_* values into the client bundle at build time.
          NEXT_PUBLIC_AUTH_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AUTH_CLIENT_ID }}
          NEXT_PUBLIC_AUTH_AUTHORITY: ${{ secrets.NEXT_PUBLIC_AUTH_AUTHORITY }}

      - name: Install production node_modules for packaging
        # `pnpm prune --prod` leaves the dev-only deps out of node_modules so
        # the deploy ZIP stays small. If prod deps end up sharing workspace
        # hoist issues we can fall back to `npm install --omit=dev`.
        run: pnpm prune --prod

      - name: Create deployment package
        # Deliberately explicit list — avoids shipping the whole repo. Package
        # the files the runtime actually reads.
        run: |
          zip -qr deploy.zip \
            .next \
            public \
            node_modules \
            package.json \
            pnpm-lock.yaml \
            next.config.mjs \
            proxy.ts
          du -h deploy.zip

      - name: Log in to Azure with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve App Service name for this environment
        id: resolve
        run: |
          RG="rg-promoshop-${AZURE_ENV_NAME}"
          APP_NAME=$(az webapp list \
            --resource-group "$RG" \
            --query "[?starts_with(name, 'app-promoshop-${AZURE_ENV_NAME}-')].name | [0]" \
            -o tsv)
          if [ -z "$APP_NAME" ]; then
            echo "No App Service found in $RG matching 'app-promoshop-${AZURE_ENV_NAME}-*'. Run azure-provision.yml first." >&2
            exit 1
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "resource_group=$RG" >> "$GITHUB_OUTPUT"

      - name: Deploy ZIP to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.resolve.outputs.app_name }}
          package: deploy.zip
          # slot-name omitted — deploying to production slot. Slot-based
          # blue/green is a follow-up once the client signs off on post-
          # launch risk appetite.

      - name: Warm up the site
        # Single GET against the home page to force the Node process to
        # compile + hydrate the first render before real user traffic hits.
        run: |
          set +e
          HOSTNAME=$(az webapp show \
            --name "${{ steps.resolve.outputs.app_name }}" \
            --resource-group "${{ steps.resolve.outputs.resource_group }}" \
            --query "defaultHostName" -o tsv)
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://$HOSTNAME/")
            echo "Warm-up attempt $i → HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 10
          done
          exit 1
