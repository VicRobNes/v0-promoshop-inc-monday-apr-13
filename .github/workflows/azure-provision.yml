name: Azure Provision (azd)

# Provisions the Azure foundation infrastructure defined in infra/*.bicep.
# Triggered manually via workflow_dispatch so it runs whether the machine
# that queued it is on or not. Uses OIDC federated credentials against the
# App Registration created in docs/runbooks/production-go-live.md.

on:
  workflow_dispatch:
    inputs:
      environmentName:
        description: "azd environment name (dev | staging | prod)"
        required: true
        default: "prod"
      location:
        description: "Azure region for non-hosting resources"
        required: false
        default: "canadacentral"
      appServiceSku:
        description: "App Service Plan SKU (P0v3 for prod, B1 for dev smoke only)"
        required: false
        default: "P0v3"
        type: choice
        options:
          - B1
          - P0v3
          - P1v3
          - P2v3
      customDomainName:
        description: "Custom domain to bind (leave empty to skip). Registrar-side CNAME + TXT must be in place first."
        required: false
        default: ""
      budgetContactEmails:
        description: 'JSON array of email addresses for budget alerts, e.g. ["ops@promoshopinc.com"]. Empty array to skip.'
        required: false
        default: "[]"
      budgetAmountUsd:
        description: "Monthly budget ceiling in USD"
        required: false
        default: "150"
      alertContactEmails:
        description: 'JSON array of email addresses for app alerts (availability, 5xx, CPU). Empty to skip.'
        required: false
        default: "[]"
      grantDeployPrincipalRgContributor:
        description: "Grant the deploying principal RG Contributor (leave false for least privilege)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write   # OIDC
  contents: read

concurrency:
  group: azure-provision-${{ github.event.inputs.environmentName }}
  cancel-in-progress: false

jobs:
  provision:
    name: azd provision
    runs-on: ubuntu-latest
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ github.event.inputs.environmentName }}
      AZURE_LOCATION: ${{ github.event.inputs.location }}
      AZURE_APP_SERVICE_SKU: ${{ github.event.inputs.appServiceSku }}
      AZURE_CUSTOM_DOMAIN_NAME: ${{ github.event.inputs.customDomainName }}
      AZURE_BUDGET_CONTACT_EMAILS: ${{ github.event.inputs.budgetContactEmails }}
      AZURE_BUDGET_AMOUNT_USD: ${{ github.event.inputs.budgetAmountUsd }}
      AZURE_ALERT_CONTACT_EMAILS: ${{ github.event.inputs.alertContactEmails }}
      AZURE_GRANT_DEPLOY_PRINCIPAL_RG_CONTRIBUTOR: ${{ github.event.inputs.grantDeployPrincipalRgContributor }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Azure Developer CLI (azd)
        uses: Azure/setup-azd@v2.0.0

      - name: Log in to Azure with azd (OIDC federated)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Initialise azd environment (idempotent)
        run: |
          if ! azd env select "$AZURE_ENV_NAME" 2>/dev/null; then
            azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION" --subscription "$AZURE_SUBSCRIPTION_ID" --no-prompt
          fi
          azd env set AZURE_LOCATION "$AZURE_LOCATION"
          azd env set AZURE_SUBSCRIPTION_ID "$AZURE_SUBSCRIPTION_ID"
          azd env set AZURE_APP_SERVICE_SKU "$AZURE_APP_SERVICE_SKU"
          azd env set AZURE_CUSTOM_DOMAIN_NAME "$AZURE_CUSTOM_DOMAIN_NAME"
          azd env set AZURE_BUDGET_CONTACT_EMAILS "$AZURE_BUDGET_CONTACT_EMAILS"
          azd env set AZURE_BUDGET_AMOUNT_USD "$AZURE_BUDGET_AMOUNT_USD"
          azd env set AZURE_ALERT_CONTACT_EMAILS "$AZURE_ALERT_CONTACT_EMAILS"
          azd env set AZURE_GRANT_DEPLOY_PRINCIPAL_RG_CONTRIBUTOR "$AZURE_GRANT_DEPLOY_PRINCIPAL_RG_CONTRIBUTOR"

      - name: Provision infrastructure
        run: azd provision --no-prompt

      - name: Emit deployment outputs
        if: always()
        run: |
          echo "### azd provision outputs" >> "$GITHUB_STEP_SUMMARY"
          azd env get-values >> "$GITHUB_STEP_SUMMARY" || true
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Next steps:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. If a custom domain was supplied, run 'az webapp config ssl bind --certificate-thumbprint <thumb> --ssl-type SNI --hostname <domain> --name <app> --resource-group <rg>' to complete the SNI binding." >> "$GITHUB_STEP_SUMMARY"
          echo "2. Dispatch azure-deploy.yml to push the Next.js build to App Service." >> "$GITHUB_STEP_SUMMARY"
