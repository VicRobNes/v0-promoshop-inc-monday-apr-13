# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: promoshop
metadata:
  template: promoshop@1.0.0-production

# Bicep IaC at infra/main.bicep
infra:
  provider: bicep
  path: infra
  module: main

# Single service: the Next.js 16 app hosted on App Service Linux (Node 22).
# `build` + `package` + `deploy` phases run through
# .github/workflows/azure-deploy.yml (pnpm + zip + webapps-deploy@v3); this
# entry exists so `azd env get-values` + `azd monitor` pick up the site.
services:
  web:
    project: "."
    language: js
    host: appservice
    dist: .next
